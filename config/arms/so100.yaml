# SO-ARM100 (SO-100) profile.
# Runs in sim by default (driver: mock). To drive the real SO-100 over ROS2,
# set `driver: ros2` and fill in `options` to match your ros2_control setup.
name: so100
dof: 6
driver: mock                       # change to `ros2` for real hardware

# SO-100 servo chain (5 arm joints + gripper). Confirm against your URDF.
joint_names: [shoulder_pan, shoulder_lift, elbow_flex, wrist_flex, wrist_roll, gripper]
link_lengths: [0.0, 0.12, 0.12, 0.06, 0.04, 0.04]

gripper:
  type: normalized                 # SO-100 gripper jogged 0 (open) .. 1 (closed)
  range: [0.0, 1.0]

# Placeholder limits — VERIFY against the SO-100 URDF before driving hardware.
joint_limits:
  soft_lower: [-2.0, -1.8, -1.8, -1.8, -2.8, -1.0]
  soft_upper: [ 2.0,  1.8,  1.8,  1.8,  2.8,  1.0]
  max_velocity: [2.5, 2.5, 2.5, 3.0, 3.0, 3.0]

workspace:
  x_min: -0.4
  x_max:  0.4
  y_min: -0.4
  y_max:  0.4
  z_min:  0.02
  z_max:  0.6

# For real hardware (driver: ros2), e.g.:
# options:
#   state_topic:   /joint_states
#   command_topic: /so100/joint_commands
#   command_type:  joint_state
